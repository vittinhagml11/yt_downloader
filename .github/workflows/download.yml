name: Download Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      quality:
        description: 'Quality (1080, 720, 480, mp3)'
        required: true
      chat_id:
        description: 'Telegram chat_id'
        required: true
      bot_token:
        description: 'Telegram bot token'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install ffmpeg (static binary)
        run: |
          wget -q https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Write cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download
        id: download
        run: |
          mkdir downloads

          # Проверяем, YouTube ли это
          if echo "${{ github.event.inputs.url }}" | grep -qE "youtube\.com|youtu\.be"; then
            IS_YOUTUBE="true"
          else
            IS_YOUTUBE="false"
          fi

          # Для YouTube используем специальные аргументы
          if [ "$IS_YOUTUBE" = "true" ]; then
            EXTRACTOR_ARGS="--extractor-args youtube:player_client=web"
          else
            EXTRACTOR_ARGS=""
          fi

          if [ "${{ github.event.inputs.quality }}" = "mp3" ]; then
            yt-dlp \
              --cookies cookies.txt \
              --js-runtimes "node" \
              --remote-components "ejs:github" \
              $EXTRACTOR_ARGS \
              --format "bestaudio/best" \
              --extract-audio --audio-format mp3 \
              --output "downloads/%(id)s.%(ext)s" \
              --no-playlist \
              "${{ github.event.inputs.url }}"
          else
            Q="${{ github.event.inputs.quality }}"
            # Для 1080p используем склейку видео+аудио
            if [ "$Q" = "1080" ]; then
              FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio"
            else
              FORMAT="best[height<=${Q}]/best"
            fi
            yt-dlp \
              --cookies cookies.txt \
              --js-runtimes "node" \
              --remote-components "ejs:github" \
              $EXTRACTOR_ARGS \
              --format "$FORMAT" \
              --output "downloads/%(id)s.%(ext)s" \
              --no-playlist \
              "${{ github.event.inputs.url }}"
          fi

          FILE=$(ls downloads/ | head -1)
          echo "filename=downloads/$FILE" >> $GITHUB_OUTPUT
          SIZE=$(du -m "downloads/$FILE" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        run: |
          FILE="${{ steps.download.outputs.filename }}"
          SIZE="${{ steps.download.outputs.size }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          TOKEN="${{ github.event.inputs.bot_token }}"

          if [ "$SIZE" -gt 50 ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="⚠️ Файл слишком большой (${SIZE} МБ). Telegram принимает максимум 50 МБ."
            exit 0
          fi

          if [ "${{ github.event.inputs.quality }}" = "mp3" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendAudio" \
              -F chat_id="$CHAT_ID" \
              -F audio=@"$FILE"
          else
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendVideo" \
              -F chat_id="$CHAT_ID" \
              -F video=@"$FILE" \
              -F supports_streaming=true
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ github.event.inputs.bot_token }}/sendMessage" \
            -d chat_id="${{ github.event.inputs.chat_id }}" \
            -d text="❌ Ошибка при скачивании. Попробуй другое видео или качество."
