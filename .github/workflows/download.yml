name: Download Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
      quality:
        description: 'Quality (1080, 720, 480, mp3)'
        required: true
      chat_id:
        description: 'Telegram chat_id'
        required: true
      bot_token:
        description: 'Telegram bot token'
        required: true
      webhook_url:
        description: 'Webhook URL for history'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install ffmpeg (static binary)
        run: |
          wget -q https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Write cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download video and thumbnail
        id: download
        run: |
          mkdir downloads

          # Проверяем, YouTube ли это
          if echo "${{ github.event.inputs.url }}" | grep -qE "youtube\.com|youtu\.be"; then
            IS_YOUTUBE="true"
          else
            IS_YOUTUBE="false"
          fi

          # Для YouTube используем специальные аргументы
          if [ "$IS_YOUTUBE" = "true" ]; then
            EXTRACTOR_ARGS="--extractor-args youtube:player_client=web"
          else
            EXTRACTOR_ARGS=""
          fi

          # Скачиваем превью (обложку)
          yt-dlp \
            --cookies cookies.txt \
            --write-thumbnail \
            --convert-thumbnails jpg \
            --skip-download \
            --output "downloads/%(id)s.%(ext)s" \
            --no-playlist \
            "${{ github.event.inputs.url }}"

          # Получаем метаданные в JSON
          yt-dlp \
            --cookies cookies.txt \
            --dump-json \
            --no-playlist \
            "${{ github.event.inputs.url }}" > downloads/metadata.json

          # Скачиваем видео или аудио
          if [ "${{ github.event.inputs.quality }}" = "mp3" ]; then
            yt-dlp \
              --cookies cookies.txt \
              --js-runtimes "node" \
              --remote-components "ejs:github" \
              $EXTRACTOR_ARGS \
              --format "bestaudio/best" \
              --extract-audio --audio-format mp3 \
              --output "downloads/%(id)s.%(ext)s" \
              --no-playlist \
              "${{ github.event.inputs.url }}"
          else
            Q="${{ github.event.inputs.quality }}"
            # Для 1080p используем склейку видео+аудио
            if [ "$Q" = "1080" ]; then
              FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio"
            else
              FORMAT="best[height<=${Q}]/best"
            fi
            yt-dlp \
              --cookies cookies.txt \
              --js-runtimes "node" \
              --remote-components "ejs:github" \
              $EXTRACTOR_ARGS \
              --format "$FORMAT" \
              --output "downloads/%(id)s.%(ext)s" \
              --no-playlist \
              "${{ github.event.inputs.url }}"
          fi

          # Находим файлы
          VIDEO_FILE=$(ls downloads/ | grep -v ".jpg" | grep -v "metadata.json" | head -1)
          THUMB_FILE=$(ls downloads/*.jpg 2>/dev/null | head -1)
          
          # Читаем метаданные
          TITLE=$(cat downloads/metadata.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('title', 'Unknown')[:100])")
          DURATION=$(cat downloads/metadata.json | python3 -c "import sys,json; d=json.load(sys.stdin).get('duration', 0); print(f'{int(d)//60}:{int(d)%60:02d}' if d else 'N/A')")
          UPLOADER=$(cat downloads/metadata.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('uploader', 'Unknown'))")

          echo "filename=downloads/$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "thumbnail=$THUMB_FILE" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "uploader=$UPLOADER" >> $GITHUB_OUTPUT
          
          SIZE=$(du -m "downloads/$VIDEO_FILE" | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Send preview and file to Telegram
        run: |
          FILE="${{ steps.download.outputs.filename }}"
          THUMB="${{ steps.download.outputs.thumbnail }}"
          SIZE="${{ steps.download.outputs.size }}"
          TITLE="${{ steps.download.outputs.title }}"
          DURATION="${{ steps.download.outputs.duration }}"
          UPLOADER="${{ steps.download.outputs.uploader }}"
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          TOKEN="${{ github.event.inputs.bot_token }}"
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.url }}"
          WEBHOOK="${{ github.event.inputs.webhook_url }}"

          if [ "$SIZE" -gt 50 ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="⚠️ Файл слишком большой (${SIZE} МБ). Telegram принимает максимум 50 МБ."
            exit 0
          fi

          # Формируем текст сообщения
          if [ "$QUALITY" = "mp3" ]; then
            CAPTION="🎵 *${TITLE}*\\n\\n👤 ${UPLOADER}\\n⏱ ${DURATION}\\n\\n🎧 MP3 • ${SIZE} МБ"
          else
            CAPTION="🎬 *${TITLE}*\\n\\n👤 ${UPLOADER}\\n⏱ ${DURATION}\\n\\n📺 ${QUALITY}p • ${SIZE} МБ"
          fi

          # Отправляем превью с подписью
          if [ -n "$THUMB" ] && [ -f "$THUMB" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendPhoto" \
              -F chat_id="$CHAT_ID" \
              -F photo=@"$THUMB" \
              -F caption="$CAPTION" \
              -F parse_mode="MarkdownV2"
          fi

          # Отправляем файл
          if [ "$QUALITY" = "mp3" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendAudio" \
              -F chat_id="$CHAT_ID" \
              -F audio=@"$FILE" \
              -F title="$TITLE" \
              -F performer="$UPLOADER"
          else
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendVideo" \
              -F chat_id="$CHAT_ID" \
              -F video=@"$FILE" \
              -F supports_streaming=true \
              -F thumb=@"$THUMB"
          fi

          # Отправляем метаданные на webhook для сохранения в историю
          if [ -n "$WEBHOOK" ]; then
            curl -s -X POST "$WEBHOOK/webhook" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"$CHAT_ID\",\"url\":\"$URL\",\"title\":\"$TITLE\",\"quality\":\"$QUALITY\",\"duration\":\"$DURATION\",\"uploader\":\"$UPLOADER\"}"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ github.event.inputs.bot_token }}/sendMessage" \
            -d chat_id="${{ github.event.inputs.chat_id }}" \
            -d text="❌ Ошибка при скачивании. Попробуй другое видео или качество."
